<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="64" fill="#fcf7f0"/>
  <!-- 像素网格背景 -->
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#grid)"/>
  <!-- 像素方块组 - 填充效果 -->
  <!-- 底部行（满） -->
  <rect x="64" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="96" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="128" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="160" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="192" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="224" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="256" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="288" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="320" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="352" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="384" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="416" y="416" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <!-- 倒数第二行（满） -->
  <rect x="64" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="96" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="128" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="160" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="192" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="224" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="256" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="288" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="320" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="352" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="384" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="416" y="384" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <!-- 倒数第三行（部分） -->
  <rect x="64" y="352" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="96" y="352" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="128" y="352" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="160" y="352" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="192" y="352" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="224" y="352" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <rect x="256" y="352" width="32" height="32" fill="#e07840" stroke="#d46830" stroke-width="2"/>
  <!-- 空格示例 -->
  <rect x="288" y="352" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <rect x="320" y="352" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <rect x="352" y="352" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <rect x="384" y="352" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <rect x="416" y="352" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <!-- 顶部空行 -->
  <rect x="64" y="320" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <rect x="96" y="320" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <rect x="128" y="320" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <rect x="160" y="320" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <rect x="192" y="320" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <rect x="224" y="320" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <rect x="256" y="320" width="32" height="32" fill="none" stroke="rgba(212,200,184,0.2)" stroke-width="1"/>
  <!-- 标题文字 -->
  <text x="256" y="240" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="96" fill="#2c2416">
    🧩
  </text>
  <text x="256" y="300" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="48" fill="#e07840">
    方块时间
  </text>
</svg>
